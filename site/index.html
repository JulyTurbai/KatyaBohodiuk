<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KatyaBohodiuk</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="katyaBogodiuk">
        <div class="header">
            <div class="container">
                <div class="header-block">
                    <div class="menu">
                        <div class="name">
                            <h2>Dr.Katya Bogodiuk</h2>
                        </div>
                        <button class="main-button">Записатися на прийом</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="hero">
            <div class="container">
                <div class="hero-block">
                    <div class="glass-block photo">
                        <div class="photo-block">
                            <p>Дитячий гінеколог</p>
                            <img class="photo__card" src="img/photo.jpg" alt="інстаграм">
                        </div> 
                    </div>
                    <div class="social">
                        <div class="social-block">
                            <div class="social-item"><img src="img/icons/insta.svg" alt=""></div>
                            <div class="social-item"><img src="img/icons/telegram.png" alt=""></div>
                            <div class="social-item"><img src="img/icons/whatsapp.png" alt=""></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
